<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Menu with Inline Styles</title>
</head>
<body style="font-family: Arial, sans-serif ; background-color: #f0f0f0; margin: 20px;">
    <h1 style="color: green; text-align: center;">Food Menu</h1>
    <ul style="list-style-type: none; padding: 0;">
        <li style="background-color: lightgray; margin: 10px; padding: 10px; border-radius: 5px;">
            <h2 style="color: blue;">Pizza</h2>
            <p style="font-size: 18px;">A delicious pizza with tomato sauce, cheese, and your choice of toppings.</p>
        </li>
        <li style="background-color: lightgray; margin: 10px; padding: 10px; border-radius: 5px;">
            <h2 style="color: blue;">Burger</h2>
            <p style="font-size: 18px;">A juicy burger with a beef patty, lettuce, tomato, and cheese.</p>
        </li>
        <li style="background-color: lightgray; margin: 10px; padding: 10px; border-radius: 5px;">
            <h2 style="color: blue;">Salad</h2>
            <p style="font-size: 18px;">A fresh salad with mixed greens, vegetables, and your choice of dressing.</p>
        </li>
</body>
</html>

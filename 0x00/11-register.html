<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <h1>Register</h1>
    <p>Fill out the form below to create an account.</p>
    <form action="/register" method="post">
        <label for="username" >Username:</label>
        <input type="text" id="username" name="username" required placeholder="enter your name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="email@gmail.com"><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password"  min="8" required placeholder="enter your password"><br><br>
        <button type="submit">Register</button>
    
</body>
</html>
